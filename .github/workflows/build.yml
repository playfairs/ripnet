name: Build

on:
  release:
    types: [ created ]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libpcap-dev make gcc

    - name: Install dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew install libpcap

    - name: Build
      run: make

    - name: Run tests
      run: make test || true

    - name: Create archive
      run: |
        mkdir -p release
        cp bin/ripnet release/
        tar -czf ripnet-${{ matrix.os }}-x86_64.tar.gz -C release ripnet

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ripnet-${{ matrix.os }}-x86_64
        path: ripnet-${{ matrix.os }}-x86_64.tar.gz
